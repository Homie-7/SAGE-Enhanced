# SAGE Internal — managed-service deployment.
#
# Production posture: centrally hosted, VAL provider, standard mode (no
# provider controls exposed). All provider credentials are server-side
# secrets managed by the SAGE administrator; end users never supply keys.
#
# SQLite lives on a volume; swapping to Postgres later means adding a
# service here and a ProjectStore implementation — no application redesign.
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      # Production defaults — do not override per user, only per deployment.
      - SAGE_PROVIDER=val
      - SAGE_ADMIN_MODE=0
      - SAGE_DB_PATH=/data/sage.db
      - SAGE_ARTEFACT_ROOT=/data/artefacts
      # Frontend origin(s) allowed to call this API (comma-separated, public URLs).
      - SAGE_CORS_ORIGINS=${SAGE_CORS_ORIGINS:-http://localhost:5173}
      # VAL credential — server-side secret held by the SAGE administrator.
      # Users never supply keys. Endpoint facts live in prompts/configs/val.json,
      # optionally overridden per-deployment via VAL_BASE_URL/VAL_API_STYLE/VAL_MODEL.
      - VAL_API_KEY=${VAL_API_KEY:-}
      - VAL_BASE_URL=${VAL_BASE_URL:-}
      - VAL_API_STYLE=${VAL_API_STYLE:-}
      - VAL_MODEL=${VAL_MODEL:-}
    volumes:
      - sage-data:/data
      - ./prompts:/app/prompts:ro
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
volumes:
  sage-data:

